<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06080f">
<title>🚦 SignalSync</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { background: #06080f; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 480px; margin: 0 auto; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
input, button { font-family: inherit; cursor: pointer; }
input::placeholder { color: #4b5563; }

/* Header */
.header { padding: 14px 16px 10px; background: #06080f; z-index: 20; flex-shrink: 0; }
.header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.title { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
.subtitle { font-size: 11px; color: #64748b; margin-top: 1px; }
.header-btns { display: flex; gap: 8px; }
.add-btn { background: rgba(59,130,246,0.15); color: #3b82f6; border: 1px solid rgba(59,130,246,0.4); border-radius: 10px; padding: 7px 13px; font-weight: 700; font-size: 13px; }
.add-btn.active { background: rgba(239,68,68,0.15); color: #ef4444; border-color: rgba(239,68,68,0.4); }

/* Map */
#map { flex: 1; width: 100%; z-index: 1; }
.leaflet-container { background: #1a1f2e; }

/* Bottom panel */
.panel { background: #0d1117; border-top: 1px solid #1c2333; flex-shrink: 0; transition: max-height 0.3s ease; overflow: hidden; z-index: 20; }
.panel-handle { width: 36px; height: 4px; background: #1c2333; border-radius: 4px; margin: 10px auto 0; }
.panel-content { padding: 12px 16px 24px; }
.panel-empty { text-align: center; padding: 20px; color: #4b5563; font-size: 13px; }

/* Signal detail */
.sig-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.lamp { display: flex; flex-direction: column; align-items: center; gap: 4px; background: #0a0c12; border-radius: 10px; padding: 8px 7px; border: 1px solid #1c2333; flex-shrink: 0; }
.lamp-dot { width: 20px; height: 20px; border-radius: 50%; transition: all 0.4s; }
.sig-name { font-weight: 700; font-size: 16px; flex: 1; }
.sig-dist { color: #64748b; font-size: 12px; margin-top: 2px; }
.pred-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.status-badge { border-radius: 20px; padding: 3px 12px; font-size: 13px; font-weight: 700; }
.status-remaining { color: #64748b; font-size: 12px; }
.cycle-row { display: flex; gap: 10px; margin-bottom: 12px; }
.cycle-chip { font-size: 12px; }
.record-hint { color: #64748b; font-size: 12px; margin-bottom: 8px; text-align: center; }
.record-btns { display: flex; gap: 8px; margin-bottom: 12px; }
.record-btn { flex: 1; padding: 13px 8px; border-radius: 12px; font-weight: 700; font-size: 14px; border: 1.5px solid; transition: opacity 0.15s; }
.record-btn:active { opacity: 0.6; }
.record-btn.green { background: rgba(34,197,94,0.12); color: #22c55e; border-color: rgba(34,197,94,0.4); }
.record-btn.red { background: rgba(239,68,68,0.12); color: #ef4444; border-color: rgba(239,68,68,0.4); }
.history-label { color: #64748b; font-size: 11px; margin-bottom: 6px; }
.history-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #1c2333; font-size: 12px; }
.history-row:last-child { border-bottom: none; }
.del-rec-btn { background: transparent; border: none; color: #4b5563; font-size: 15px; padding: 0 4px; }
.del-rec-btn:active { color: #ef4444; }
.delete-sig-btn { width: 100%; padding: 9px; background: rgba(239,68,68,0.08); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; font-weight: 600; font-size: 13px; margin-top: 12px; }

/* Add mode banner */
.add-banner { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.3); border-radius: 10px; padding: 8px 12px; font-size: 13px; color: #93c5fd; text-align: center; margin-bottom: 8px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: flex-end; }
.modal { background: #0d1117; border-radius: 20px 20px 0 0; padding: 24px; width: 100%; max-width: 480px; margin: 0 auto; }
.modal-title { font-weight: 800; font-size: 17px; margin-bottom: 4px; }
.modal-sub { color: #64748b; font-size: 13px; margin-bottom: 18px; }
.field-label { color: #64748b; font-size: 12px; margin-bottom: 6px; }
.field { margin-bottom: 14px; }
.inp { width: 100%; padding: 10px 12px; background: #06080f; border: 1px solid #1c2333; border-radius: 8px; color: #e2e8f0; font-size: 14px; outline: none; -webkit-appearance: none; }
.inp:focus { border-color: #3b82f6; }
.row-btns { display: flex; gap: 8px; }
.cancel-btn { flex: 1; padding: 13px; background: transparent; color: #4b5563; border: 1px solid #1c2333; border-radius: 12px; font-weight: 600; font-size: 15px; }
.submit-btn { flex: 2; padding: 13px; background: #3b82f6; color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; }
.submit-btn:disabled { background: #1c2333; color: #4b5563; }
.coord-display { background: #06080f; border: 1px solid #1c2333; border-radius: 8px; padding: 10px 12px; color: #22c55e; font-size: 13px; margin-bottom: 14px; text-align: center; }

/* Confirm */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; }
.confirm-box { background: #0d1117; border: 1px solid #1c2333; border-radius: 16px; padding: 24px; width: 100%; max-width: 320px; }
.confirm-title { font-weight: 800; font-size: 16px; margin-bottom: 8px; }
.confirm-sub { color: #64748b; font-size: 13px; margin-bottom: 20px; }
.confirm-btns { display: flex; gap: 8px; }
.confirm-cancel { flex: 1; padding: 12px; background: transparent; color: #64748b; border: 1px solid #1c2333; border-radius: 10px; font-weight: 600; font-size: 14px; }
.confirm-ok { flex: 1; padding: 12px; background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid rgba(239,68,68,0.4); border-radius: 10px; font-weight: 700; font-size: 14px; }

/* Toast */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: white; padding: 10px 22px; border-radius: 30px; font-weight: 700; font-size: 14px; white-space: nowrap; z-index: 300; pointer-events: none; animation: fadeup 0.2s ease; }
@keyframes fadeup { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

/* Leaflet custom marker */
.sig-marker { width: 36px; height: 36px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; background: #0d1117; border: 2px solid #1c2333; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.5); cursor: pointer; padding: 4px; }
.sig-marker.selected { border-color: #3b82f6; box-shadow: 0 0 12px rgba(59,130,246,0.5); }
.sig-marker .m-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <div class="title">🚦 SignalSync</div>
      <div class="subtitle" id="gps-label">📡 GPS取得中...</div>
    </div>
    <div class="header-btns">
      <button class="add-btn" id="add-btn" onclick="toggleAddMode()">+ 信号を追加</button>
    </div>
  </div>
  <div id="add-banner" style="display:none" class="add-banner">
    📍 地図上の信号の場所をタップして追加
  </div>
</div>

<div id="map"></div>

<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <div class="panel-content" id="panel-content">
    <div class="panel-empty">信号をタップして詳細を表示</div>
  </div>
</div>

<!-- Name Modal -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-title">📍 信号を追加</div>
    <div class="modal-sub" id="modal-coord"></div>
    <div class="field">
      <div class="field-label">交差点名</div>
      <input class="inp" id="sig-name" placeholder="例：大曽根交差点">
    </div>
    <div class="row-btns">
      <button class="cancel-btn" onclick="closeModal()">キャンセル</button>
      <button class="submit-btn" id="submit-btn" onclick="addSignal()" disabled>登録する</button>
    </div>
  </div>
</div>

<!-- Confirm -->
<div class="confirm-overlay" id="confirm-overlay" style="display:none">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title"></div>
    <div class="confirm-sub" id="confirm-sub"></div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">キャンセル</button>
      <button class="confirm-ok" id="confirm-ok">削除する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" style="display:none"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
let signals = JSON.parse(localStorage.getItem('ss-signals') || '[]');
let records = JSON.parse(localStorage.getItem('ss-records') || '{}');
let pos = null;
let selectedId = null;
let addMode = false;
let pendingLatLng = null;
let markers = {};
let posMarker = null;
let map;

// ── Map init ───────────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: false }).setView([35.18, 136.90], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  L.control.zoom({ position: 'topright' }).addTo(map);

  map.on('click', e => {
    if (!addMode) return;
    pendingLatLng = e.latlng;
    document.getElementById('modal-coord').textContent = `📍 ${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`;
    document.getElementById('sig-name').value = '';
    updateSubmitBtn();
    document.getElementById('modal').style.display = 'flex';
  });
}

// ── GPS ────────────────────────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) { document.getElementById('gps-label').textContent = '📡 GPS非対応'; return; }
  navigator.geolocation.watchPosition(p => {
    pos = { lat: p.coords.latitude, lng: p.coords.longitude };
    document.getElementById('gps-label').textContent = '📡 GPS取得済み';
    if (!posMarker) {
      map.setView([pos.lat, pos.lng], 16);
      posMarker = L.circleMarker([pos.lat, pos.lng], {
        radius: 8, fillColor: '#3b82f6', fillOpacity: 1,
        color: 'white', weight: 2, zIndexOffset: 1000
      }).addTo(map);
    } else {
      posMarker.setLatLng([pos.lat, pos.lng]);
    }
    renderPanel();
  }, () => {
    document.getElementById('gps-label').textContent = '📡 GPS失敗';
  }, { enableHighAccuracy: true, maximumAge: 5000 });
}

// ── Storage ────────────────────────────────────────────────────────────────
function saveSignals() { localStorage.setItem('ss-signals', JSON.stringify(signals)); }
function saveRecords() { localStorage.setItem('ss-records', JSON.stringify(records)); }

// ── Math ───────────────────────────────────────────────────────────────────
function dist(lat1,lng1,lat2,lng2) {
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function inferCycle(recs) {
  if (!recs||recs.length<2) return null;
  const sorted=[...recs].sort((a,b)=>a.ts-b.ts);
  const g=[],r=[];
  for (let i=0;i+1<sorted.length;i++) {
    const dt=(sorted[i+1].ts-sorted[i].ts)/1000;
    if (dt<5||dt>300) continue;
    if (sorted[i].to==='green') g.push(dt);
    if (sorted[i].to==='red') r.push(dt);
  }
  const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
  const gs=avg(g),rs=avg(r);
  if (!gs&&!rs) return null;
  return { greenSec:gs??30, redSec:rs??30, samples:recs.length };
}
function predictNow(recs,cycle) {
  if (!cycle||!recs?.length) return null;
  const last=[...recs].sort((a,b)=>a.ts-b.ts).at(-1);
  let elapsed=(Date.now()-last.ts)/1000,state=last.to;
  while (elapsed>0) {
    const dur=state==='green'?cycle.greenSec:cycle.redSec;
    if (elapsed<dur) return {state,remaining:Math.round(dur-elapsed)};
    elapsed-=dur; state=state==='green'?'red':'green';
  }
  return {state,remaining:null};
}

// ── Markers ────────────────────────────────────────────────────────────────
function makeIcon(sig, isSelected) {
  const recs = records[sig.id] || [];
  const cycle = inferCycle(recs);
  const pred = cycle ? predictNow(recs, cycle) : null;
  const isG = pred?.state === 'green', isR = pred?.state === 'red';
  const redColor = isR ? '#ef4444' : 'rgba(239,68,68,0.15)';
  const greenColor = isG ? '#22c55e' : 'rgba(34,197,94,0.15)';
  const redGlow = isR ? '0 0 6px #ef4444' : 'none';
  const greenGlow = isG ? '0 0 6px #22c55e' : 'none';
  const border = isSelected ? '#3b82f6' : '#1c2333';
  const shadow = isSelected ? '0 0 14px rgba(59,130,246,0.5)' : '0 2px 8px rgba(0,0,0,0.5)';

  return L.divIcon({
    html: `<div style="width:36px;height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:#0d1117;border:2px solid ${border};border-radius:8px;box-shadow:${shadow};padding:5px;cursor:pointer">
      <div style="width:11px;height:11px;border-radius:50%;background:${redColor};box-shadow:${redGlow};transition:all 0.4s"></div>
      <div style="width:11px;height:11px;border-radius:50%;background:${greenColor};box-shadow:${greenGlow};transition:all 0.4s"></div>
    </div>`,
    iconSize: [36, 44], iconAnchor: [18, 22], className: ''
  });
}

function syncMarkers() {
  const existingIds = new Set(signals.map(s => s.id));
  // remove deleted
  Object.keys(markers).forEach(id => {
    if (!existingIds.has(id)) { markers[id].remove(); delete markers[id]; }
  });
  // add/update
  signals.forEach(sig => {
    if (markers[sig.id]) {
      markers[sig.id].setIcon(makeIcon(sig, selectedId === sig.id));
    } else {
      const m = L.marker([sig.lat, sig.lng], { icon: makeIcon(sig, false) })
        .addTo(map)
        .on('click', () => selectSignal(sig.id));
      markers[sig.id] = m;
    }
  });
}

function selectSignal(id) {
  selectedId = id === selectedId ? null : id;
  syncMarkers();
  renderPanel();
  if (selectedId) {
    const sig = signals.find(s => s.id === selectedId);
    if (sig) map.panTo([sig.lat, sig.lng]);
  }
}

// ── Panel ──────────────────────────────────────────────────────────────────
function renderPanel() {
  const el = document.getElementById('panel-content');
  if (!selectedId) {
    el.innerHTML = '<div class="panel-empty">信号をタップして詳細を表示</div>';
    return;
  }
  const sig = signals.find(s => s.id === selectedId);
  if (!sig) { el.innerHTML = ''; return; }

  const recs = records[sig.id] || [];
  const cycle = inferCycle(recs);
  const pred = cycle ? predictNow(recs, cycle) : null;
  const isG = pred?.state === 'green', isR = pred?.state === 'red';
  const redDot = `background:${isR?'#ef4444':'rgba(239,68,68,0.1)'};box-shadow:${isR?'0 0 10px #ef4444':'none'}`;
  const greenDot = `background:${isG?'#22c55e':'rgba(34,197,94,0.1)'};box-shadow:${isG?'0 0 10px #22c55e':'none'}`;

  const distStr = pos ? `${Math.round(dist(pos.lat,pos.lng,sig.lat,sig.lng))}m先` : '';

  const predHtml = pred
    ? `<div class="pred-row">
        <span class="status-badge" style="background:${isG?'rgba(34,197,94,0.15)':'rgba(239,68,68,0.15)'};color:${isG?'#22c55e':'#ef4444'}">${isG?'🟢 青':'🔴 赤'}</span>
        ${pred.remaining!=null?`<span class="status-remaining">あと${pred.remaining}秒</span>`:''}
       </div>`
    : `<div style="color:#4b5563;font-size:12px;margin-bottom:10px">${recs.length===0?'まだ記録なし':`記録${recs.length}件 — あと少し！`}</div>`;

  const cycleHtml = cycle
    ? `<div class="cycle-row">
        <span class="cycle-chip" style="color:#22c55e">🟢 ${Math.round(cycle.greenSec)}秒</span>
        <span class="cycle-chip" style="color:#ef4444">🔴 ${Math.round(cycle.redSec)}秒</span>
        <span class="cycle-chip" style="color:#64748b">📊 ${cycle.samples}回</span>
       </div>` : '';

  const recent = [...recs].sort((a,b)=>b.ts-a.ts).slice(0,4);
  const histHtml = recent.length
    ? `<div class="history-label">直近の記録（✕で削除）</div>
       ${recent.map((r,i)=>`<div class="history-row">
         <span style="color:${r.to==='green'?'#22c55e':'#ef4444'}">${r.to==='green'?'🟢 青':'🔴 赤'}</span>
         <span style="color:#4b5563">${new Date(r.ts).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
         <button class="del-rec-btn" onclick="deleteRecord('${sig.id}',${i})">✕</button>
       </div>`).join('')}` : '';

  el.innerHTML = `
    <div class="sig-header">
      <div class="lamp">
        <div class="lamp-dot" style="${redDot}"></div>
        <div class="lamp-dot" style="${greenDot}"></div>
      </div>
      <div>
        <div class="sig-name">${sig.name}</div>
        <div class="sig-dist">${distStr}</div>
      </div>
    </div>
    ${predHtml}
    ${cycleHtml}
    <div class="record-hint">信号が変わった瞬間にタップ</div>
    <div class="record-btns">
      <button class="record-btn green" onclick="recordChange('${sig.id}','green')">🟢 青に変わった</button>
      <button class="record-btn red" onclick="recordChange('${sig.id}','red')">🔴 赤に変わった</button>
    </div>
    ${histHtml}
    <button class="delete-sig-btn" onclick="deleteSignal('${sig.id}','${sig.name.replace(/'/g,"\\'")}')">🗑 この信号を削除する</button>
  `;
}

// ── Actions ────────────────────────────────────────────────────────────────
function recordChange(sigId, toState) {
  if (!records[sigId]) records[sigId] = [];
  records[sigId].push({ ts: Date.now(), to: toState });
  saveRecords();
  syncMarkers();
  renderPanel();
  showToast(toState==='green'?'🟢 青を記録！':'🔴 赤を記録！', toState==='green'?'#22c55e':'#ef4444');
}

function deleteRecord(sigId, idx) {
  showConfirm('この記録を削除', '押し間違えた記録を1件削除します。', () => {
    const sorted = [...(records[sigId]||[])].sort((a,b)=>b.ts-a.ts);
    const tsToRemove = sorted[idx].ts;
    records[sigId] = (records[sigId]||[]).filter(r=>r.ts!==tsToRemove);
    saveRecords(); syncMarkers(); renderPanel();
    showToast('記録を削除しました', '#64748b');
  });
}

function deleteSignal(sigId, sigName) {
  showConfirm(`「${sigName}」を削除`, 'この信号と全ての記録が削除されます。', () => {
    if (markers[sigId]) { markers[sigId].remove(); delete markers[sigId]; }
    signals = signals.filter(s=>s.id!==sigId);
    delete records[sigId];
    saveSignals(); saveRecords();
    selectedId = null;
    renderPanel();
    showToast('削除しました', '#ef4444');
  });
}

// ── Add mode ───────────────────────────────────────────────────────────────
function toggleAddMode() {
  addMode = !addMode;
  const btn = document.getElementById('add-btn');
  const banner = document.getElementById('add-banner');
  if (addMode) {
    btn.textContent = '✕ キャンセル'; btn.classList.add('active');
    banner.style.display = 'block';
    map.getContainer().style.cursor = 'crosshair';
  } else {
    btn.textContent = '+ 信号を追加'; btn.classList.remove('active');
    banner.style.display = 'none';
    map.getContainer().style.cursor = '';
  }
}

function updateSubmitBtn() {
  document.getElementById('submit-btn').disabled = !document.getElementById('sig-name').value.trim();
}
document.addEventListener('input', updateSubmitBtn);

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  toggleAddMode(); // exit add mode after cancel too
}

function addSignal() {
  const name = document.getElementById('sig-name').value.trim();
  if (!name || !pendingLatLng) return;
  const sig = { id:`s${Date.now()}`, name, lat: pendingLatLng.lat, lng: pendingLatLng.lng };
  signals.push(sig); saveSignals();
  document.getElementById('modal').style.display = 'none';
  addMode = false;
  document.getElementById('add-btn').textContent = '+ 信号を追加';
  document.getElementById('add-btn').classList.remove('active');
  document.getElementById('add-banner').style.display = 'none';
  map.getContainer().style.cursor = '';
  syncMarkers();
  selectSignal(sig.id);
  showToast('登録しました！', '#22c55e');
}

// ── Confirm ────────────────────────────────────────────────────────────────
function showConfirm(title, sub, onOk) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-sub').textContent = sub;
  document.getElementById('confirm-ok').onclick = () => { closeConfirm(); onOk(); };
  document.getElementById('confirm-overlay').style.display = 'flex';
}
function closeConfirm() { document.getElementById('confirm-overlay').style.display = 'none'; }

// ── Toast ──────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color; t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.style.display='none', 2000);
}

// ── Tick ───────────────────────────────────────────────────────────────────
setInterval(() => { syncMarkers(); renderPanel(); }, 1000);

// ── Init ───────────────────────────────────────────────────────────────────
initMap();
startGPS();
syncMarkers();
renderPanel();
</script>
</body>
</html>
